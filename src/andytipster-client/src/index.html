<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>AndyTipster</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <script>
    // Apply theme immediately to prevent flash of unstyled content
    (function() {
      try {
        var stored = localStorage.getItem('andytipster-theme');
        if (stored === 'andytipster-light' || stored === 'andytipster-dark') {
          document.documentElement.setAttribute('data-theme', stored);
        } else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
          document.documentElement.setAttribute('data-theme', 'andytipster-dark');
        } else {
          document.documentElement.setAttribute('data-theme', 'andytipster-light');
        }
      } catch (e) {
        document.documentElement.setAttribute('data-theme', 'andytipster-light');
      }
    })();
  </script>
</head>
<body class="bg-base-100 text-base-content">
  <app-root></app-root>
</body>
</html>
