<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>AndyTipster</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#1E3A5A">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="icons/icon-512x512.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <script>
    // Apply theme immediately to prevent flash of unstyled content
    (function() {
      try {
        var stored = localStorage.getItem('andytipster-theme');
        if (stored === 'andytipster-light' || stored === 'andytipster-dark') {
          document.documentElement.setAttribute('data-theme', stored);
        } else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
          document.documentElement.setAttribute('data-theme', 'andytipster-dark');
        } else {
          document.documentElement.setAttribute('data-theme', 'andytipster-light');
        }
      } catch (e) {
        document.documentElement.setAttribute('data-theme', 'andytipster-light');
      }
    })();
  </script>
</head>
<body class="bg-base-100 text-base-content">
  <app-root></app-root>
  <noscript>Please enable JavaScript to use AndyTipster.</noscript>
</body>
</html>
